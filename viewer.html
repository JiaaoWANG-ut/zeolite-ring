<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeolite Ring — Viewer</title>
    <link rel="stylesheet" href="assets/css/viewer.css">
    <script src="assets/js/config.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>

<body data-page-title="viewerTitle">
    <div id="loading-overlay">
        <div class="spinner"></div>
        <p data-i18n="viewerLoading">Loading structure</p>
    </div>

    <div id="modal-overlay">
        <div class="modal-content modal-panel">
            <div class="modal-header">
                <h2 data-i18n="modalSelect">Select Zeolite Framework</h2>
                <div class="close-btn" onclick="toggleModal(false)">×</div>
            </div>
            <div class="modal-toolbar">
                <input type="text" id="modal-search" data-i18n-placeholder="modalSearch" placeholder="Search framework code…">
                <div class="chip-legend">
                    <span class="chip-legend-item"><span class="ring-dot ring-5" aria-hidden="true"></span><span data-i18n="modalLegend5">5MR</span></span>
                    <span class="chip-legend-item"><span class="ring-dot ring-6" aria-hidden="true"></span><span data-i18n="modalLegend6">6MR</span></span>
                    <span class="chip-legend-item"><span class="chip-legend-sample both" aria-hidden="true"></span><span data-i18n="modalLegendBoth">Both</span></span>
                </div>
            </div>
            <div id="chip-grid"></div>
        </div>
    </div>

    <div id="export-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 data-i18n="exportTitle">Export Image</h2>
                <div class="close-btn" onclick="toggleExportModal(false)">×</div>
            </div>
            <div class="export-layout">
                <div class="preview-container"><img id="export-preview-img" src="" alt="Preview"></div>
                <div class="export-controls">
                    <div class="control-group">
                        <label data-i18n="exportResolution">Resolution</label>
                        <div class="dpi-grid">
                            <div class="dpi-btn active" onclick="setDPI(1)">1x</div>
                            <div class="dpi-btn" onclick="setDPI(2)">2x</div>
                            <div class="dpi-btn" onclick="setDPI(4)">4x</div>
                        </div>
                    </div>
                    <div class="toggle-row"><span data-i18n="exportAxes">Include Axes</span><label class="switch"><input type="checkbox"
                                id="toggle-axes-export" checked><span class="slider"></span></label></div>
                    <button class="primary" style="margin-top: auto; padding: 15px;"
                        onclick="downloadExport()" data-i18n="exportDownload">Download</button>
                </div>
            </div>
        </div>
    </div>

    <div id="auth-bar">
        <button type="button" class="lang-btn" data-lang="en">EN</button>
        <button type="button" class="lang-btn" data-lang="zh">中文</button>
        <span id="user-email"></span>
        <a href="landing.html" data-i18n="viewerHome">Home</a>
        <button id="sign-out-btn" type="button" data-i18n="viewerSignOut">Sign Out</button>
    </div>

    <div id="ui">
        <div class="panel-header">
            <h1>Zeolite Ring</h1>
            <div class="panel-sub" data-i18n="viewerSub">Framework Viewer</div>
        </div>
        <div class="select-trigger" onclick="toggleModal(true)"><span id="current-name" data-i18n="viewerSelect">Select Framework</span><span>↗</span></div>

        <div class="panel-section">
            <div class="panel-section-title" data-i18n="secLattice">Lattice Expansion</div>
        <div class="control-group">
            <label><span data-i18n="expX">Expansion X</span> <span class="value-display" id="exp-x-val">2</span></label>
            <input type="range" id="exp-x" min="1" max="5" value="2">
        </div>
        <div class="control-group">
            <label><span data-i18n="expY">Expansion Y</span> <span class="value-display" id="exp-y-val">2</span></label>
            <input type="range" id="exp-y" min="1" max="5" value="2">
        </div>
        <div class="control-group">
            <label><span data-i18n="expZ">Expansion Z</span> <span class="value-display" id="exp-z-val">2</span></label>
            <input type="range" id="exp-z" min="1" max="5" value="2">
        </div>
        </div>

        <div class="panel-section">
            <div class="panel-section-title" data-i18n="secAppearance">Appearance</div>
        <div class="control-group">
            <label><span data-i18n="bondThick">Bond Thickness</span> <span class="value-display" id="thick-val">0.10</span></label>
            <input type="range" id="thickness" min="0.02" max="0.3" step="0.01" value="0.10">
        </div>
        <div class="control-group">
            <label><span data-i18n="stdOpacity">Standard Opacity</span> <span class="value-display" id="alpha-val">0.40</span></label>
            <input type="range" id="opacity" min="0" max="1" step="0.05" value="0.40">
        </div>
        <div class="control-group">
            <label><span data-i18n="faceOpacity">Face Opacity</span> <span class="value-display" id="face-alpha-val">0.20</span></label>
            <input type="range" id="face-opacity" min="0" max="1" step="0.05" value="0.20">
        </div>
        <div class="control-group">
            <div class="color-picker">
                <input type="color" id="bg-color" value="#f4f5f7">
                <label style="margin:0" data-i18n="bgColor">Background</label>
            </div>
        </div>
        </div>

        <div class="panel-section">
            <div class="panel-section-title" data-i18n="secCamera">Camera</div>
        <div class="control-group">
            <label><span data-i18n="viewPadding">View Padding (Å)</span> <span class="value-display" id="padding-val">10.0</span></label>
            <input type="range" id="padding" min="0" max="20" step="0.5" value="10.0">
        </div>
        <div class="control-group">
            <label><span data-i18n="fov">FOV</span> <span class="value-display" id="fov-val">0</span></label>
            <input type="range" id="fov" min="0" max="100" value="0">
        </div>
        </div>

        <div class="panel-section">
            <div class="panel-section-title" data-i18n="secRings">Ring Overlays</div>
            <div class="toggle-row"><span class="ring-5" data-i18n="ring5">5-Member Rings</span><label class="switch"><input type="checkbox"
                        id="toggle-5mr" checked onchange="updateVisuals()"><span class="slider"></span></label></div>
            <div class="toggle-row"><span class="ring-6" data-i18n="ring6">6-Member Rings</span><label class="switch"><input
                        type="checkbox" id="toggle-6mr" checked onchange="updateVisuals()"><span
                        class="slider"></span></label></div>
            <div class="toggle-row"><span data-i18n="axes">Coordinate Axes</span><label class="switch"><input
                        type="checkbox" id="toggle-axes-main" checked onchange="updateAxesVisibility()"><span
                        class="slider"></span></label></div>
            <div class="toggle-row"><span data-i18n="autoRotate">Auto-Rotate</span><label class="switch"><input
                        type="checkbox" id="toggle-rotate" onchange="updateRotation()"><span
                        class="slider"></span></label></div>
        </div>

        <div class="btn-group">
            <button onclick="resetCamera()" data-i18n="resetView">Reset View</button>
            <button class="primary" onclick="openExportUI()" data-i18n="exportPng">Export PNG</button>
        </div>
    </div>
    <div id="status" data-i18n="viewerReady">Ready</div>

    <script>
        let scene, camera, renderer, controls, topology = null;
        let perspectiveCamera, orthographicCamera;
        let bondGroup = new THREE.Group(), faceGroup = new THREE.Group(), axesHelper = new THREE.Group();
        let exportDPI = 1;
        let isUserInteracting = false;

        const COLORS = { standard: 0x64748b, mr5: 0x047857, mr6: 0xb45309 };

        async function init() {
            scene = new THREE.Scene(); scene.background = new THREE.Color(0xf4f5f7);
            const aspect = window.innerWidth / window.innerHeight;
            perspectiveCamera = new THREE.PerspectiveCamera(60, aspect, 0.1, 2000);
            orthographicCamera = new THREE.OrthographicCamera(-20 * aspect, 20 * aspect, 20, -20, 1, 2000);
            camera = orthographicCamera; camera.position.set(25, 20, 25);

            renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            renderer.domElement.addEventListener('pointerdown', () => isUserInteracting = true);
            window.addEventListener('pointerup', () => isUserInteracting = false);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true; controls.autoRotate = false;

            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            let d1 = new THREE.DirectionalLight(0xffffff, 0.8); d1.position.set(20, 30, 20); scene.add(d1);
            scene.add(bondGroup); scene.add(faceGroup);

            [new THREE.Vector3(1, 0, 0), new THREE.Vector3(0, 1, 0), new THREE.Vector3(0, 0, 1)].forEach((v, i) => {
                axesHelper.add(new THREE.ArrowHelper(v, new THREE.Vector3(0, 0, 0), 6, [0xff4444, 0x44ff44, 0x4444ff][i], 1.2, 0.6));
            });
            scene.add(axesHelper);

            const [metaRes, listRes] = await Promise.all([fetch('zeolite_metadata.json'), fetch('cif_list.txt?t=' + Date.now())]);
            const metadata = await metaRes.json(), cifFiles = (await listRes.text()).split('\n').map(s => s.trim()).filter(s => s);

            window.renderChips = (f = '') => {
                const grid = document.getElementById('chip-grid'); grid.innerHTML = '';
                cifFiles.filter(x => x.toLowerCase().includes(f.toLowerCase())).forEach(c => {
                    const name = c.replace('.cif', ''), m = metadata[name] || { rings5: 0, rings6: 0 };
                    const has5 = m.rings5 > 0, has6 = m.rings6 > 0;
                    const el = document.createElement('div'); el.className = 'zeo-chip';
                    if (has5 && has6) el.classList.add('has-both');
                    else if (has5) el.classList.add('has-5mr');
                    else if (has6) el.classList.add('has-6mr');
                    else el.classList.add('has-none');

                    const nameEl = document.createElement('span');
                    nameEl.className = 'zeo-chip-name';
                    nameEl.textContent = name;

                    if (has5 || has6) {
                        const rings = document.createElement('span');
                        rings.className = 'zeo-chip-rings';
                        if (has5) {
                            const d5 = document.createElement('span');
                            d5.className = 'ring-dot ring-5';
                            d5.title = '5MR';
                            rings.appendChild(d5);
                        }
                        if (has6) {
                            const d6 = document.createElement('span');
                            d6.className = 'ring-dot ring-6';
                            d6.title = '6MR';
                            rings.appendChild(d6);
                        }
                        el.appendChild(rings);
                    }

                    el.appendChild(nameEl);

                    el.onclick = () => { loadZeolite(c); toggleModal(false); };
                    grid.appendChild(el);
                });
            };
            document.addEventListener('langchange', () => renderChips(document.getElementById('modal-search').value));
            document.getElementById('modal-search').oninput = e => renderChips(e.target.value);
            renderChips(); loadZeolite('LTA.cif'); setupUI(); animate();
        }

        async function loadZeolite(c) {
            document.getElementById('current-name').innerText = c.replace('.cif', '');
            document.getElementById('loading-overlay').style.display = 'flex';
            try {
                const name = c.replace('.cif', '');
                const res = await fetch(`data/topology/${name}.json`);
                if (!res.ok) throw new Error(`Topology not found for ${name}`);
                topology = await res.json();
                updateVisuals();
            } catch (err) {
                document.getElementById('status').innerText = err.message;
            } finally { document.getElementById('loading-overlay').style.display = 'none'; }
        }

        function updateVisuals() {
            if (!topology) return;
            [bondGroup, faceGroup].forEach(g => {
                while (g.children.length) {
                    let c = g.children[0]; if (c.geometry) c.geometry.dispose(); if (c.material) c.material.dispose(); g.remove(c);
                }
            });

            const nx = +document.getElementById('exp-x').value, ny = +document.getElementById('exp-y').value, nz = +document.getElementById('exp-z').value;
            const thick = +document.getElementById('thickness').value, alpha = +document.getElementById('opacity').value, fAlpha = +document.getElementById('face-opacity').value;
            const padding = +document.getElementById('padding').value;
            const lattice = topology.lattice.map(v => new THREE.Vector3(...v)), pts = topology.points.map(v => new THREE.Vector3(...v));

            const lux = lattice[0].length(), luy = lattice[1].length(), luz = lattice[2].length();
            const px = Math.ceil(padding / lux), py = Math.ceil(padding / luy), pz = Math.ceil(padding / luz);

            const minV = new THREE.Vector3(-padding, -padding, -padding);
            const maxV = new THREE.Vector3(nx * lux + padding, ny * luy + padding, nz * luz + padding);
            const isInside = p => (p.x >= minV.x - 0.01 && p.x <= maxV.x + 0.01 && p.y >= minV.y - 0.01 && p.y <= maxV.y + 0.01 && p.z >= minV.z - 0.01 && p.z <= maxV.z + 0.01);

            const show5 = document.getElementById('toggle-5mr').checked, show6 = document.getElementById('toggle-6mr').checked;
            const specialBonds = { 5: new Set(), 6: new Set() };
            const mats = {
                std: new THREE.MeshPhongMaterial({ color: 0x64748b, transparent: true, opacity: alpha }),
                m5: new THREE.MeshPhongMaterial({ color: COLORS.mr5, emissive: 0x052e16 }),
                m6: new THREE.MeshPhongMaterial({ color: COLORS.mr6, emissive: 0x422006 }),
                f5: new THREE.MeshPhongMaterial({ color: COLORS.mr5, transparent: true, opacity: fAlpha, side: 2 }),
                f6: new THREE.MeshPhongMaterial({ color: COLORS.mr6, transparent: true, opacity: fAlpha, side: 2 })
            };

            const getBKey = (u, uO, v, vO) => {
                const r = [vO[0] - uO[0], vO[1] - uO[1], vO[2] - uO[2]];
                let cU, cV, cUO, cRel;
                if (u < v) { cU = u; cV = v; cUO = uO; cRel = r; }
                else if (v < u) { cU = v; cV = u; cUO = vO; cRel = r.map(x => -x); }
                else {
                    const isMain = r[0] > -r[0] || (r[0] == -r[0] && r[1] > -r[1]) || (r[0] == -r[0] && r[1] == -r[1] && r[2] > -r[2]);
                    if (isMain) { cU = u; cV = v; cUO = uO; cRel = r; }
                    else { cU = v; cV = u; cUO = vO; cRel = r.map(x => -x); }
                }
                return `${cU}-${cV}-${cRel.join(',')}@${cUO.join(',')}`;
            };

            const processRings = (cycles, size, fMat, bSet) => {
                if (!cycles) return;
                for (let x = -px; x < nx + px; x++) for (let y = -py; y < ny + py; y++) for (let z = -pz; z < nz + pz; z++) {
                    const cell = lattice[0].clone().multiplyScalar(x).add(lattice[1].clone().multiplyScalar(y)).add(lattice[2].clone().multiplyScalar(z));
                    cycles.forEach(cyc => {
                        let allIn = true;
                        const cPts = cyc.map(n => {
                            const off = lattice[0].clone().multiplyScalar(n.offset[0]).add(lattice[1].clone().multiplyScalar(n.offset[1])).add(lattice[2].clone().multiplyScalar(n.offset[2]));
                            const p = pts[n.idx].clone().add(cell).add(off);
                            if (!isInside(p)) allIn = false;
                            return p;
                        });
                        if (!allIn) return;
                        if (fAlpha > 0.01) {
                            const geo = new THREE.BufferGeometry(); const v = [];
                            for (let i = 1; i < size - 1; i++) { v.push(cPts[0].x, cPts[0].y, cPts[0].z, cPts[i].x, cPts[i].y, cPts[i].z, cPts[i + 1].x, cPts[i + 1].y, cPts[i + 1].z); }
                            geo.setAttribute('position', new THREE.Float32BufferAttribute(v, 3)); geo.computeVertexNormals();
                            faceGroup.add(new THREE.Mesh(geo, fMat));
                        }
                        cyc.forEach((n, i) => {
                            const m = cyc[(i + 1) % size];
                            bSet.add(getBKey(n.idx, [x + n.offset[0], y + n.offset[1], z + n.offset[2]], m.idx, [x + m.offset[0], y + m.offset[1], z + m.offset[2]]));
                        });
                    });
                }
            };

            if (show5) processRings(topology.cycles5, 5, mats.f5, specialBonds[5]);
            if (show6) processRings(topology.cycles6, 6, mats.f6, specialBonds[6]);

            for (let x = -px; x < nx + px; x++) for (let y = -py; y < ny + py; y++) for (let z = -pz; z < nz + pz; z++) {
                const cell = lattice[0].clone().multiplyScalar(x).add(lattice[1].clone().multiplyScalar(y)).add(lattice[2].clone().multiplyScalar(z));
                topology.bonds.forEach(b => {
                    const p1 = pts[b.from].clone().add(cell);
                    const off = lattice[0].clone().multiplyScalar(b.offset[0]).add(lattice[1].clone().multiplyScalar(b.offset[1])).add(lattice[2].clone().multiplyScalar(b.offset[2]));
                    const p2 = pts[b.to].clone().add(cell).add(off);
                    if (!isInside(p1) || !isInside(p2)) return;

                    const key = getBKey(b.from, [x, y, z], b.to, [x + b.offset[0], y + b.offset[1], z + b.offset[2]]);
                    let mat = mats.std;
                    if (specialBonds[6].has(key)) mat = mats.m6;
                    else if (specialBonds[5].has(key)) mat = mats.m5;

                    const dist = p1.distanceTo(p2); const geo = new THREE.CylinderGeometry(thick, thick, dist, 8);
                    const m = new THREE.Mesh(geo, mat); m.position.copy(p1.clone().add(p2).multiplyScalar(0.5));
                    m.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), p2.clone().sub(p1).normalize());
                    bondGroup.add(m);
                });
            }
            const center = minV.clone().add(maxV).multiplyScalar(0.5);
            controls.target.copy(center);
        }

        function setupUI() {
            const bind = (id, vId, cb) => document.getElementById(id).oninput = e => { if (vId) document.getElementById(vId).innerText = e.target.value; cb(); };
            bind('exp-x', 'exp-x-val', updateVisuals); bind('exp-y', 'exp-y-val', updateVisuals); bind('exp-z', 'exp-z-val', updateVisuals);
            bind('thickness', 'thick-val', updateVisuals); bind('opacity', 'alpha-val', updateVisuals); bind('face-opacity', 'face-alpha-val', updateVisuals);
            bind('padding', 'padding-val', updateVisuals);
            bind('fov', 'fov-val', () => {
                const f = +document.getElementById('fov').value; camera = f === 0 ? orthographicCamera : perspectiveCamera;
                if (f > 0) { camera.fov = f; camera.updateProjectionMatrix(); }
                controls.object = camera;
            });

            document.getElementById('bg-color').oninput = (e) => {
                scene.background.set(e.target.value);
            };
        }

        function updateAxesVisibility() { axesHelper.visible = document.getElementById('toggle-axes-main').checked; }
        function updateRotation() { controls.autoRotate = document.getElementById('toggle-rotate').checked; }
        function toggleModal(s) { document.getElementById('modal-overlay').style.display = s ? 'flex' : 'none'; }
        function toggleExportModal(s) { document.getElementById('export-overlay').style.display = s ? 'flex' : 'none'; }
        function openExportUI() { renderer.render(scene, camera); document.getElementById('export-preview-img').src = renderer.domElement.toDataURL(); toggleExportModal(true); }
        function setDPI(v) { exportDPI = v; document.querySelectorAll('.dpi-btn').forEach(b => b.classList.toggle('active', b.innerText.includes(v + 'x'))); }
        function downloadExport() {
            const size = new THREE.Vector2(); renderer.getSize(size);
            renderer.setSize(size.x * exportDPI, size.y * exportDPI, false); renderer.render(scene, camera);
            const a = document.createElement('a'); a.download = 'zeolite.png'; a.href = renderer.domElement.toDataURL(); a.click();
            renderer.setSize(size.x, size.y, true);
        }
        function resetCamera() { controls.reset(); camera.position.set(25, 20, 25); }

        function applyMagneticSnapping() {
            if (isUserInteracting || controls.autoRotate) return;

            const dist = camera.position.distanceTo(controls.target);
            const dir = camera.position.clone().sub(controls.target).normalize();
            const axes = [
                new THREE.Vector3(1, 0, 0), new THREE.Vector3(-1, 0, 0),
                new THREE.Vector3(0, 1, 0), new THREE.Vector3(0, -1, 0),
                new THREE.Vector3(0, 0, 1), new THREE.Vector3(0, 0, -1)
            ];

            let bestAxis = null;
            let maxDot = 0.995; // Threshold for snapping (~5.7 degrees)

            axes.forEach(axis => {
                const dot = dir.dot(axis);
                if (dot > maxDot) {
                    maxDot = dot;
                    bestAxis = axis;
                }
            });

            if (bestAxis && maxDot < 1) {
                const newPos = bestAxis.clone().multiplyScalar(dist).add(controls.target);
                camera.position.lerp(newPos, 0.1);
                camera.lookAt(controls.target);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            applyMagneticSnapping();
            controls.update();
            renderer.render(scene, camera);
        }
        window.addEventListener('resize', () => {
            const w = window.innerWidth, h = window.innerHeight; renderer.setSize(w, h); camera.aspect = w / h; camera.updateProjectionMatrix();
        });
        window.startViewer = init;
    </script>
    <script type="module">
        import { requireAuth, signOut, isAuthConfigured } from './assets/js/auth.js';
        import { initI18n, t } from './assets/js/i18n.js';

        initI18n();

        async function bootAuth() {
            if (!isAuthConfigured()) {
                document.getElementById('user-email').textContent = t('viewerDevMode');
                document.getElementById('sign-out-btn').style.display = 'none';
                window.startViewer();
                return;
            }
            const session = await requireAuth('landing.html');
            if (!session) return;
            document.getElementById('user-email').textContent = session.user.email || 'Signed in';
            document.getElementById('sign-out-btn').addEventListener('click', () => signOut());
            window.startViewer();
        }

        bootAuth();
    </script>
</body>

</html>
